name: macos-release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  MACOS_BUNDLE_ID: "com.devcrew.desktop"

jobs:
  macos-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Extract version from tag
        run: |
          VERSION_NO_V="${GITHUB_REF_NAME#v}"
          echo "VERSION_NO_V=${VERSION_NO_V}" >> "$GITHUB_ENV"

      - name: Build desktop project
        run: |
          dotnet build src/DevCrew.Desktop/DevCrew.Desktop.csproj \
            -c Release \
            /property:GenerateFullPaths=true \
            /consoleloggerparameters:NoSummary

      - name: Run core tests
        run: |
          dotnet test tests/DevCrew.Core.Tests/DevCrew.Core.Tests.csproj -c Release

      - name: Publish macOS app bundle
        run: |
          dotnet publish src/DevCrew.Desktop/DevCrew.Desktop.csproj \
            -c Release \
            -r osx-arm64 \
            --self-contained true \
            -p:Version=${VERSION_NO_V} \
            -p:DebugSymbols=false \
            -p:DebugType=none \
            -o ./artifacts/publish/desktop/osx-arm64

      - name: Publish macOS CLI binary
        run: |
          dotnet publish src/DevCrew.Cli/DevCrew.Cli.csproj \
            -c Release \
            -r osx-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${VERSION_NO_V} \
            -p:DebugSymbols=false \
            -p:DebugType=none \
            -o ./artifacts/publish/cli/osx-arm64

      - name: Resolve app bundle path
        run: |
          PRIMARY_PATH="./artifacts/publish/desktop/osx-arm64/DevCrew.Desktop.app"
          FALLBACK_PATH="./src/DevCrew.Desktop/bin/Release/net10.0/osx-arm64/DevCrew.Desktop.app"

          if [[ -d "$PRIMARY_PATH" ]]; then
            APP_BUNDLE_PATH="$PRIMARY_PATH"
          elif [[ -d "$FALLBACK_PATH" ]]; then
            APP_BUNDLE_PATH="$FALLBACK_PATH"
          else
            echo "DevCrew.Desktop.app not found in publish output." >&2
            exit 1
          fi

          echo "APP_BUNDLE_PATH=${APP_BUNDLE_PATH}" >> "$GITHUB_ENV"

      - name: Resolve CLI binary path
        run: |
          PRIMARY_PATH="./artifacts/publish/cli/osx-arm64/DevCrew.Cli"
          FALLBACK_PATH="./src/DevCrew.Cli/bin/Release/net10.0/osx-arm64/publish/DevCrew.Cli"

          if [[ -f "$PRIMARY_PATH" ]]; then
            CLI_BINARY_PATH="$PRIMARY_PATH"
          elif [[ -f "$FALLBACK_PATH" ]]; then
            CLI_BINARY_PATH="$FALLBACK_PATH"
          else
            echo "DevCrew.Cli executable not found in publish output." >&2
            exit 1
          fi

          echo "CLI_BINARY_PATH=${CLI_BINARY_PATH}" >> "$GITHUB_ENV"

      - name: Set bundle metadata in Info.plist
        run: |
          PLIST_PATH="${APP_BUNDLE_PATH}/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION_NO_V}" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION_NO_V}" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${{ env.MACOS_BUNDLE_ID }}" "$PLIST_PATH" || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string ${{ env.MACOS_BUNDLE_ID }}" "$PLIST_PATH"

      - name: Ensure packaging scripts are executable
        run: |
          chmod +x ./scripts/packaging/macos/create-pkg.sh

      - name: Create PKG installer
        run: |
          ./scripts/packaging/macos/create-pkg.sh \
            --app "${APP_BUNDLE_PATH}" \
            --cli "${CLI_BINARY_PATH}" \
            --version "${VERSION_NO_V}" \
            --package-id "${{ env.MACOS_BUNDLE_ID }}" \
            --output-dir "./artifacts/dist"

      - name: Verify PKG output
        run: |
          ls -lah ./artifacts/dist
          test -f "./artifacts/dist/DevCrew-${VERSION_NO_V}.pkg"

      - name: Generate Sparkle AppCast
        run: |
          FILENAME="appcast.xml"

          if [[ "${{ github.ref_name }}" == *"alpha"* ]]; then
            FILENAME="appcast-alpha.xml"
          elif [[ "${{ github.ref_name }}" == *"beta"* ]]; then
            FILENAME="appcast-beta.xml"
          fi

          cat <<EOF > ./artifacts/dist/${FILENAME}
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
              <channel>
                  <title>Version ${VERSION_NO_V}</title>
                      <sparkle:releaseNotesLink>https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}</sparkle:releaseNotesLink>
                      <pubDate>$(date -u +"%a, %d %b %Y %H:%M:%S GMT")</pubDate>
                      <enclosure url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/DevCrew-${VERSION_NO_V}.pkg"
                                 sparkle:version="${VERSION_NO_V}"
                                 sparkle:shortVersionString="${VERSION_NO_V}"
                                 type="application/octet-stream" />
                  </item>
              </channel>
          </rss>
          EOF

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v7
        with:
          name: DevCrew-macos-installer-${{ env.VERSION_NO_V }}
          path: ./artifacts/dist/

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: DevCrew v${{ env.VERSION_NO_V }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ./artifacts/dist/DevCrew-${{ env.VERSION_NO_V }}.pkg
            ./artifacts/dist/appcast.xml